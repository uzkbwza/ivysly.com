    <style>
      #theme-toggle {
        position: fixed;
        bottom: 10px;
        right: 10px;
        z-index: 999;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
      }
      .theme-icon {
        display: block;
      }
      @media (max-width: 768px) {
        .theme-icon {
          width: 48px;
          height: 48px;
        }
      }
      :root[data-theme="dark"] .theme-icon {
        filter: invert(1);
      }
    </style>
    <script>
      (function() {
        var saved = localStorage.getItem('theme');
        if (saved) {
          document.documentElement.setAttribute('data-theme', saved);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>

<script>
  function isDark() {
    return document.documentElement.getAttribute('data-theme') === 'dark';
  }

  // Handle hover for header
  document.querySelectorAll('.header-image').forEach(img => {
    img.addEventListener('mouseover', () => img.src = isDark() ? img.dataset.hoverDark : img.dataset.hover);
    img.addEventListener('mouseout', () => img.src = isDark() ? img.dataset.normalDark : img.dataset.normal);
  });

  // Handle hover for image map areas
  document.querySelectorAll('area[data-target]').forEach(area => {
    const img = document.getElementById(area.dataset.target);
    area.addEventListener('mouseover', () => img.src = isDark() ? img.dataset.hoverDark : img.dataset.hover);
    area.addEventListener('mouseout', () => img.src = isDark() ? img.dataset.normalDark : img.dataset.normal);
  });

  // Dynamically scale the collage to fit within the window width
  function scaleCollage() {
    const collage = document.getElementById('collage');
    const wrapper = document.getElementById('collage-wrapper');
    const scale = Math.min(1, wrapper.clientWidth / collage.offsetWidth);
    collage.style.transform = `translateX(-50%) scale(${scale})`;
  }

  window.addEventListener('load', scaleCollage);
  window.addEventListener('resize', scaleCollage);

  // Swap images for current theme
  function applyThemeImages() {
    var dark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.querySelectorAll('[data-normal-dark]').forEach(img => {
      var isHovered = img.src === img.dataset.hover || img.src === img.dataset.hoverDark;
      if (dark) {
        img.src = isHovered ? img.dataset.hoverDark : img.dataset.normalDark;
      } else {
        img.src = isHovered ? img.dataset.hover : img.dataset.normal;
      }
    });
  }
  applyThemeImages();

  // Re-apply when theme toggles
  new MutationObserver(applyThemeImages).observe(
    document.documentElement, {attributes: true, attributeFilter: ['data-theme']}
  );

  // Preload all image variants
  document.querySelectorAll('[data-hover]').forEach(img => {
    new Image().src = img.dataset.hover;
    if (img.dataset.hoverDark) new Image().src = img.dataset.hoverDark;
    if (img.dataset.normalDark) new Image().src = img.dataset.normalDark;
  });
</script>

    <script src="/theme/js/relativetime.js"></script>
    <script>
      function toggleTheme() {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        var icon = document.querySelector('.theme-icon');
        if (icon) icon.src = next === 'dark' ? icon.dataset.dark : icon.dataset.light;
      }
      document.addEventListener('DOMContentLoaded', function() {
        var icon = document.querySelector('.theme-icon');
        if (icon) icon.src = document.documentElement.getAttribute('data-theme') === 'dark' ? icon.dataset.dark : icon.dataset.light;
      });
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem('theme')) {
          document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
        }
      });
    </script>
